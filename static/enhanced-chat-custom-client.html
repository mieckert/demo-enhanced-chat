<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">    
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="/bootstrap/css/bootstrap.min.css">

    <title>Enhanced Chat Custom Client</title>
    <style type="text/css">
/* 1. The 5-line limit logic */
.collapse-content.collapsed:not(.show):not(.collapsing) {
    display: -webkit-box;
    -webkit-line-clamp: 5;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

/* 2. The Icon styling and rotation */
.toggle-icon {
    display: inline-block;
    transition: transform 0.2s ease;
    width: 1.2rem; /* Give it a fixed width so text doesn't jump */
    text-align: center;
}

/* When the header is expanded, rotate the icon */
.toggle-header[aria-expanded="true"] .toggle-icon {
    transform: rotate(90deg);
}

/* 3. Header styling */
.toggle-header {
    cursor: pointer;
    background-color: #f8f9fa;
}

.toggle-header:hover {
    background-color: #f1f1f1;
}
    </style>
</head>

<body>
    <div class="container">
        <h1>Enhanced Chat Custom Client</h1>
        
        <div class="container mt-4" id="log-container">            

        </div>
        
        <pre id="log">
        </pre>
    </div>

    <script src="/jquery/jquery.slim.min.js"></script>
    <script src="/bootstrap/js/bootstrap.bundle.js"></script>
    <script src="/event-source-polyfill/eventsource.min.js"></script>
    <script src="enhanced-chat-custom-client.js"></script>
</body>
</html>
