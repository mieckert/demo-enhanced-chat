    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="/bootstrap/css/bootstrap.min.css">

    <title>Enhanced Chat Custom Client</title>
    <style type="text/css">
.collapse-content.collapsed:not(.show) {
    position: relative;
    max-height: 7.5em; /* 5 lines * 1.5 line-height */
    overflow: hidden;
}

.collapse-content.collapsed:not(.show)::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 2em;
    background: linear-gradient(transparent, white);
}
    </style>
</head>

        <h1>Enhanced Chat Custom Client</h1>

        </pre>
    </div>

</body>
