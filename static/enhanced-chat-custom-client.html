<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">    
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="/bootstrap/css/bootstrap.min.css">

    <title>Enhanced Chat Custom Client</title>
    <style type="text/css">
/* Limit to 5 lines when collapsed and not animating */
.collapse-content.collapsed:not(.show):not(.collapsing) {
    display: -webkit-box;
    -webkit-line-clamp: 5;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

/* Rotate icon based on Bootstrap's aria-expanded state */
.toggle-header[aria-expanded="true"] .toggle-icon {
    transform: rotate(90deg);
}

.toggle-icon {
    transition: transform 0.2s ease;
    display: inline-block;
}

/* Make header look clickable */
.toggle-header {
    cursor: pointer;
}
    </style>
</head>

<body>
    <div class="container">
        <h1>Enhanced Chat Custom Client</h1>
        
        <div class="container mt-4" id="log-container">            

        </div>
        
        <pre id="log">
        </pre>
    </div>

    <script src="/jquery/jquery.slim.min.js"></script>
    <script src="/bootstrap/js/bootstrap.bundle.js"></script>

    <script src="enhanced-chat-custom-client.js"></script>
</body>
</html>
